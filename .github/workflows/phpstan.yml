name: PHPStan

on: [ push, pull_request ]

jobs:
    phpstan:
        runs-on: ubuntu-latest

        name: PHPStan

        steps:
            -   uses: actions/checkout@v6

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.4'
                    coverage: none

            -   name: Install dependencies
                run: composer install --no-interaction --prefer-dist

            -   name: Run PHPStan
                run: vendor/bin/phpstan analyse
